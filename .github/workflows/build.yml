name: Android APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: npm install
        run: npm install

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Capacitor Android add
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: www folder
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Capacitor sync
        run: npx cap sync android

      - name: Manifest patch
        run: |
          FILE="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "READ_MEDIA_AUDIO" "$FILE"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO"/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>\n</manifest>|' "$FILE"
          fi

      - name: APK build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mahni-pleyer-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
