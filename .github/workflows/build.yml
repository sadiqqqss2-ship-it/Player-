name: Android APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm install
        run: npm install

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Capacitor Android əlavə et
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Manifest patch
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "READ_MEDIA_AUDIO" "$MANIFEST"; then
            sed -i 's|<uses-permission android:name="android.permission.INTERNET"/>|<uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO"/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>|' "$MANIFEST"
          fi

      - name: Capacitor sync
        run: npx cap sync android

      - name: APK build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mahni-pleyer-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
